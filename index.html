<!DOCTYPE html>
<html>
<head>
<title>To-Do App | Sidhant Kumar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>To-Do App</h1>
<p>Manage your daily tasks efficiently</p>

  <div>
    <input type="text" id="taskInput" placeholder="Enter your task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList">
      </ul>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
  let editIndex = -1;

  function render() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");
      li.textContent = task.text;

      if (task.done) li.style.textDecoration = "line-through";

      li.onclick = () => {
        task.done = !task.done;
        save();
      };

      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";

      editBtn.onclick = (e) => {
        e.stopPropagation();
        document.getElementById("taskInput").value = task.text;
        editIndex = index;

        document.querySelector("button").textContent = "Update";
      };

      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";

      delBtn.onclick = (e) => {
        e.stopPropagation();
        tasks.splice(index, 1);
        save();
      };

      li.appendChild(editBtn);
      li.appendChild(delBtn);

      list.appendChild(li);
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");

    if (!input.value) return alert("Enter something");

    if (editIndex === -1) {
      tasks.push({ text: input.value, done: false });
    } else {
      tasks[editIndex].text = input.value;
      editIndex = -1;
      document.querySelector("button").textContent = "Add";
    }

    input.value = "";
    save();
  }

  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
    render();
  }

  window.onload = () => {
    render();

    document.getElementById("taskInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") addTask();
    });
  };
</script></body>
</html>
